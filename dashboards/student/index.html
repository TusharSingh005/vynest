<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard | VyNest</title>
    <link rel="icon" type="image/png" href="/imgs/favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .booking-card {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .modal-animate {
        animation: slideUp 0.3s ease-out;
      }

      @keyframes slideUp {
        from {
          transform: translateY(10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .notif-dot {
        position: relative;
        margin-right: -3px;
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: #ef4444;
        display: inline-block;
      }
      .notif-dot-blink {
        animation: notifBlink 1s infinite;
      }
      @keyframes notifBlink {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.3;
          transform: scale(0.85);
        }
      }
    </style>
  </head>

  <body class="bg-slate-50 text-slate-900">
    <nav
      class="sticky top-0 z-50 bg-white border-b border-slate-200 px-4 py-3 shadow-sm"
    >
      <div class="max-w-full mx-auto flex justify-between items-center">
        <a href="../../index.html" class="flex items-center">
          <img src="/imgs/logo.png" class="h-8 md:h-9" alt="VyNest Logo" />
        </a>

        <div class="flex items-center gap-2">
          <div class="relative" id="bellWrapper">
            <button
              id="bellBtn"
              onclick="toggleBellDropdown()"
              class="relative w-10 h-10 flex items-center justify-center bg-slate-50 border border-slate-200 rounded-full hover:bg-slate-100 transition"
            >
              <i class="fa-solid fa-bell text-slate-600"></i>
              <span
                id="navBellDot"
                class="hidden absolute top-2 right-2 notif-dot notif-dot-blink"
              ></span>
            </button>

            <div
              id="bellDropdown"
              class="hidden fixed inset-x-3 top-20 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden z-50 modal-animate md:absolute md:inset-x-auto md:top-full md:right-0 md:mt-3 md:w-[22rem]"
            >
              <div class="px-4 py-3 border-b bg-slate-50/70">
                <p class="text-xs font-black text-slate-700 uppercase tracking-widest">
                  Notifications
                </p>
              </div>
              <div id="bellNotificationsContainer" class="max-h-[58vh] overflow-y-auto divide-y divide-slate-100 md:max-h-80">
                <div class="p-4 text-sm text-slate-500">Loading notifications...</div>
              </div>
              <div class="p-3 border-t bg-white">
                <a
                  href="./notifications.html"
                  class="block w-full text-center text-sm font-bold text-indigo-600 hover:text-indigo-700"
                >
                  View all notifications
                </a>
              </div>
            </div>
          </div>

          <div class="relative" id="profileWrapper">
          <button
            id="profileBtn"
            onclick="toggleProfileDropdown()"
            class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full p-1 pr-3 hover:bg-slate-100 transition focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
          >
            <div
              id="navAvatarInitial"
              class="w-8 h-8 md:w-9 md:h-9 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-full flex items-center justify-center text-white text-xs md:text-sm font-black uppercase shadow-inner border border-white/20"
            >
              U
            </div>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                d="M19 9l-7 7-7-7"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>

          <div
            id="profileDropdown"
            class="hidden absolute right-0 mt-3 w-52 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden z-50 modal-animate"
          >
            <div class="px-5 py-4 border-b bg-slate-50/50">
              <p
                class="text-[10px] font-black text-indigo-600 uppercase tracking-widest"
              >
                Student Account
              </p>
              <p
                id="studentEmailNav"
                class="text-xs font-bold text-slate-700 truncate"
              >
                Loading...
              </p>
            </div>

            <div class="p-1.5">
              <a
                href="profile.html"
                class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 rounded-xl transition font-medium"
              >
                <i class="fa-solid fa-user text-indigo-400 text-xs"></i> My
                Profile
              </a>

              <button
                onclick="handleLogout()"
                class="w-full text-left flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 rounded-xl transition font-medium"
              >
                <i
                  class="fa-solid fa-right-from-bracket text-red-400 text-xs"
                ></i>
                Log out
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
      <h1 id="studentName" class="text-3xl font-black mb-10 text-slate-800">
        Loading your profile...
      </h1>

      <section>
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-xl font-black flex items-center gap-2">
            <i class="fa-solid fa-house-chimney text-indigo-600"></i>
            My Bookings
          </h2>
        </div>

        <div id="bookingsContainer" class="space-y-6">
          <div
            id="loadingState"
            class="text-center py-20 bg-white rounded-[2rem] border border-slate-100 shadow-sm"
          >
            <div
              class="inline-block animate-spin w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"
            ></div>
            <p class="text-slate-500 font-bold">Syncing your reservations...</p>
          </div>
        </div>

        <div
          id="noBooking"
          class="hidden text-center py-20 bg-white rounded-[2rem] border border-dashed border-slate-300"
        >
          <div
            class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6"
          >
            <i class="fa-solid fa-calendar-xmark text-4xl text-slate-300"></i>
          </div>
          <p class="text-slate-500 font-bold text-lg">
            No active bookings found.
          </p>
          <p class="text-slate-400 text-sm mt-1">
            Start your journey by finding the perfect room.
          </p>
          <a
            href="../../pages/rooms.html"
            class="inline-block mt-6 px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200"
            >Browse Rooms →</a
          >
        </div>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
        query,
        collection,
        where,
        onSnapshot,
        limit,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAd_HMHS9QkOe2pt_tH-sunWpuIaULCxtY",
        authDomain: "vynest-b58fa.firebaseapp.com",
        projectId: "vynest-b58fa",
        storageBucket: "vynest-b58fa.firebasestorage.app",
        messagingSenderId: "503196958388",
        appId: "1:503196958388:web:b78d771ddbd8dbf56161e1",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const BACKEND_BASE_URL = "https://vynest-backend.vynest750.workers.dev";
      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      let notificationUnsubscribers = [];
      const NEW_NOTIFICATION_WINDOW_MS = 12 * 60 * 60 * 1000;

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function mergeSnapshotsById(snapshotArrays) {
        const mergedMap = new Map();

        snapshotArrays.forEach((snapshot) => {
          snapshot.forEach((docSnap) => {
            mergedMap.set(docSnap.id, {
              id: docSnap.id,
              ...docSnap.data(),
            });
          });
        });

        return Array.from(mergedMap.values()).sort((a, b) => {
          const aMillis =
            typeof a.createdAt?.toMillis === "function"
              ? a.createdAt.toMillis()
              : (a.createdAt?.seconds || 0) * 1000;
          const bMillis =
            typeof b.createdAt?.toMillis === "function"
              ? b.createdAt.toMillis()
              : (b.createdAt?.seconds || 0) * 1000;
          return bMillis - aMillis;
        });
      }

      function toMillis(timestamp) {
        return typeof timestamp?.toMillis === "function"
          ? timestamp.toMillis()
          : (timestamp?.seconds || 0) * 1000;
      }

      function formatNotificationTime(timestamp) {
        if (!timestamp) {
          return "Just now";
        }

        return new Date(toMillis(timestamp)).toLocaleString("en-IN", {
          day: "2-digit",
          month: "short",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function isFreshNotification(notification) {
        if (!notification?.createdAt) {
          return false;
        }

        return Date.now() - toMillis(notification.createdAt) <= NEW_NOTIFICATION_WINDOW_MS;
      }

      function updateBellIndicator(notifications) {
        const navDot = document.getElementById("navBellDot");

        if (!notifications.length || !isFreshNotification(notifications[0])) {
          navDot.classList.add("hidden");
          return;
        }

        navDot.classList.remove("hidden");
      }

      function renderBellNotifications(items) {
        const container = document.getElementById("bellNotificationsContainer");

        if (!items.length) {
          container.innerHTML =
            '<div class="p-4 text-sm text-slate-500">No notifications yet.</div>';
          return;
        }

        container.innerHTML = items
          .slice(0, 6)
          .map((notification, index) => {
            const showDot = index === 0 && isFreshNotification(notification);

            return `
            <div class="p-4">
              <p class="text-sm font-bold text-slate-800 flex items-center gap-2">
                ${escapeHtml(notification.title || "Notification")}
                ${showDot ? '<span class="notif-dot notif-dot-blink"></span>' : ""}
              </p>
              <p class="text-xs text-slate-600 mt-1">${escapeHtml(notification.message || "")}</p>
              <p class="text-[11px] text-slate-400 mt-2">${escapeHtml(formatNotificationTime(notification.createdAt))}</p>
            </div>
          `;
          })
          .join("");
      }

      function startStudentNotificationFeed(uid) {
        notificationUnsubscribers.forEach((unsub) => unsub());
        notificationUnsubscribers = [];

        const snapshots = {
          direct: null,
          role: null,
        };

        const maybeRender = () => {
          if (!snapshots.direct || !snapshots.role) {
            return;
          }

          const merged = mergeSnapshotsById([snapshots.direct, snapshots.role]);
          updateBellIndicator(merged);
          renderBellNotifications(merged);
        };

        const directQuery = query(
          collection(db, "notifications"),
          where("targetIds", "array-contains", uid),
          limit(20),
        );

        const roleQuery = query(
          collection(db, "notifications"),
          where("targetRoles", "array-contains", "student"),
          limit(20),
        );

        notificationUnsubscribers.push(
          onSnapshot(directQuery, (snapshot) => {
            snapshots.direct = snapshot;
            maybeRender();
          }),
        );

        notificationUnsubscribers.push(
          onSnapshot(roleQuery, (snapshot) => {
            snapshots.role = snapshot;
            maybeRender();
          }),
        );
      }

      async function reconcileOrderBooking(orderId) {
        if (!orderId) {
          return false;
        }

        const currentUser = auth.currentUser;

        if (!currentUser) {
          return false;
        }

        const idToken = await currentUser.getIdToken();

        const maxAttempts = 10;

        for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
          try {
            const response = await fetch(
              `${BACKEND_BASE_URL}/verify-payment/${encodeURIComponent(orderId)}`,
              {
                headers: {
                  Authorization: `Bearer ${idToken}`,
                },
              },
            );
            const result = await response.json();

            if (result?.success) {
              return true;
            }
          } catch (error) {
            console.error("Order reconciliation failed", error);
          }

          await sleep(1500);
        }

        return false;
      }

      const allowStudentView = async (user) => {
        const userSnap = await getDoc(doc(db, "users", user.uid));

        if (!userSnap.exists()) {
          return false;
        }

        const userData = userSnap.data();

        if ((userData.role || "student") !== "student") {
          await signOut(auth);
          window.location.href = "/pages/login.html";
          return false;
        }

        return true;
      };

      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "/pages/login.html";
          return;
        }

        const canContinue = await allowStudentView(user);

        if (!canContinue) {
          return;
        }

        // UPDATED: Set both the avatar and the email in the dropdown
        document.getElementById("navAvatarInitial").innerText =
          user.email[0].toUpperCase();
        document.getElementById("studentEmailNav").innerText = user.email;

        try {
          const userSnap = await getDoc(doc(db, "users", user.uid));
          // ... rest of your code ...
          const studentNameEl = document.getElementById("studentName");
          studentNameEl.innerText = userSnap.exists()
            ? `Hi, ${userSnap.data().fullName}! 👋`
            : `Hi, Nest User! 👋`;

          const orderId = new URLSearchParams(window.location.search).get(
            "order_id",
          );

          if (orderId) {
            await reconcileOrderBooking(orderId);
            const cleanUrl = `${window.location.pathname}?booking=success`;
            window.history.replaceState({}, "", cleanUrl);
          }

          startStudentNotificationFeed(user.uid);
          loadAllBookings(user.uid);
        } catch (error) {
          console.error("Auth Error:", error);
        }
      });

      async function loadAllBookings(uid) {
        const container = document.getElementById("bookingsContainer");
        const noBooking = document.getElementById("noBooking");

        try {
          const q = query(collection(db, "bookings"), where("userId", "==", uid));

          const snap = await getDocs(q);
          container.innerHTML = "";

          if (snap.empty) {
            noBooking.classList.remove("hidden");
            return;
          }

          noBooking.classList.add("hidden");

          const bookings = snap.docs
            .map((bookingDoc) => ({
              id: bookingDoc.id,
              ...bookingDoc.data(),
            }))
            .sort((a, b) => {
              const aMillis =
                typeof a.createdAt?.toMillis === "function"
                  ? a.createdAt.toMillis()
                  : (a.createdAt?.seconds || 0) * 1000;
              const bMillis =
                typeof b.createdAt?.toMillis === "function"
                  ? b.createdAt.toMillis()
                  : (b.createdAt?.seconds || 0) * 1000;
              return bMillis - aMillis;
            });

          for (const booking of bookings) {
            const roomSnap = await getDoc(doc(db, "rooms", booking.roomId));
            const room = roomSnap.exists() ? roomSnap.data() : {};

            // FIXED: Fetch Owner Details using Document ID directly
            let ownerName = "Property Manager";
            let ownerPhone = "Not Available";
            let ownerEmail = "Not Available";

            if (room.ownerId) {
              const ownerDocSnap = await getDoc(
                doc(db, "users", room.ownerId.trim()),
              );
              if (ownerDocSnap.exists()) {
                const oData = ownerDocSnap.data();
                ownerName = oData.fullName || "Property Manager";
                ownerPhone = oData.phone || "Not Available";
                ownerEmail = oData.email || "Not Available";
              }
            }

            // Dynamic Fee Calculation
            const type = (room.propertyType || "").toLowerCase();
            let displayFee = booking.bookingAmount || 0;
            if (displayFee === 0) {
              if (type.includes("flat")) displayFee = 4000;
              else if (type.includes("hostel")) displayFee = 7000;
              else if (type.includes("pg")) {
                const hasFood =
                  (room.description || "").toLowerCase().includes("food") ||
                  (room.amenities || []).some((a) =>
                    a.toLowerCase().includes("food"),
                  );
                displayFee = hasFood ? 2000 : 1000;
              }
            }

            const bookingDate = booking.createdAt
              ? new Date(
                  typeof booking.createdAt.toMillis === "function"
                    ? booking.createdAt.toMillis()
                    : booking.createdAt.seconds * 1000,
                ).toLocaleDateString("en-GB", {
                  day: "2-digit",
                  month: "short",
                })
              : "N/A";

            const cardHtml = `
        <div class="booking-card bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row gap-8 transition-all hover:shadow-md mb-6">
          <img class="w-full md:w-1/4 h-48 rounded-[2rem] object-cover bg-slate-100" 
               src="${room.imageUrls && room.imageUrls[0] ? room.imageUrls[0] : "https://via.placeholder.com/400x300"}">

          <div class="flex-1">
            <div class="flex justify-between items-start mb-2">
                <h3 class="text-2xl font-black text-slate-900">${room.propertyName || "Property"}</h3>
                <span class="text-[10px] font-black text-slate-400 bg-slate-50 px-2 py-1 rounded-md uppercase tracking-wider">Ref: ${booking.id.substring(0, 6)}</span>
            </div>

            <div class="flex flex-wrap gap-2 mb-4">
              <span class="text-[10px] font-black px-3 py-1 rounded-full uppercase bg-indigo-50 text-indigo-600 border border-indigo-100">${(room.propertyType || "Property").replace(/_/g, " ")}</span>
              <span class="text-[10px] font-black px-3 py-1 rounded-full uppercase bg-blue-50 text-blue-600 border border-blue-100">${booking.roomType || "Standard"} Room</span>
            </div>

            <p class="text-slate-500 text-sm mb-6 flex items-center">
              <i class="fa-solid fa-location-dot text-indigo-500 mr-2"></i>
              <span class="font-medium">${room.address || "Address Hidden"}</span>
            </p>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
              <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Rent / mo</p>
                <p class="text-lg font-black text-slate-900">₹${booking.roomPrice || 0}</p>
              </div>

              <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Booking Fee</p>
                <p class="text-lg font-black text-emerald-600">₹${displayFee}</p>
                <p class="text-[8px] font-black text-emerald-500 uppercase tracking-tighter">● Paid Successfully</p>
              </div>

              <div class="hidden md:block bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Booked On</p>
                <p class="text-lg font-black text-slate-900">${bookingDate}</p>
              </div>
            </div>

            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 italic">Owner Contact: ${ownerName}</h4>
            <div class="flex flex-col sm:flex-row items-center gap-4">
               <a href="tel:${ownerPhone}" class="w-full sm:w-auto flex items-center justify-center gap-3 px-6 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 hover:bg-slate-50 transition">
                  <i class="fa-solid fa-phone text-indigo-500"></i> ${ownerPhone}
               </a>
               <a href="mailto:${ownerEmail}" class="w-full sm:w-auto flex items-center justify-center gap-3 px-6 py-3 bg-white border border-slate-200 rounded-2xl text-sm font-bold text-slate-700 hover:bg-slate-50 transition">
                  <i class="fa-solid fa-envelope text-indigo-500"></i> ${ownerEmail}
               </a>
            </div>
          </div>
        </div>
      `;
            container.innerHTML += cardHtml;
          }
        } catch (error) {
          console.error("Dashboard Error:", error);
        }
      }

      /* ================= UTILS ================= */
      window.toggleBellDropdown = () => {
        const bell = document.getElementById("bellDropdown");
        const profile = document.getElementById("profileDropdown");
        profile.classList.add("hidden");
        bell.classList.toggle("hidden");
      };

      window.toggleProfileDropdown = () => {
        document.getElementById("bellDropdown").classList.add("hidden");
        document.getElementById("profileDropdown").classList.toggle("hidden");
      };

      window.handleLogout = () => {
        signOut(auth).then(() => {
          window.location.href = "../../index.html";
        });
      };

      window.addEventListener("click", (e) => {
        const profileWrapper = document.getElementById("profileWrapper");
        const bellWrapper = document.getElementById("bellWrapper");
        if (profileWrapper && !profileWrapper.contains(e.target)) {
          document.getElementById("profileDropdown").classList.add("hidden");
        }
        if (bellWrapper && !bellWrapper.contains(e.target)) {
          document.getElementById("bellDropdown").classList.add("hidden");
        }
      });
    </script>
  </body>
</html>
