<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Profile | VyNest</title>
<link rel="icon" type="image/png" href="/imgs/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }
    
    .glass-effect {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .vynest-gradient-bg {
      background: radial-gradient(circle at top right, #eef2ff, #f8fafc);
    }

    .premium-gradient {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
    }

    .modal-animate {
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>

<body class="vynest-gradient-bg min-h-screen text-slate-900">

<nav class="sticky top-0 z-50 bg-white border-b border-slate-200 px-4 py-3 shadow-sm">
  <div class="max-w-full mx-auto flex justify-between items-center">
    
    <div class="flex items-center">
      <a href="../../index.html" class="transition-opacity hover:opacity-80">
        <img src="/imgs/logo.png" class="h-8 md:h-9" alt="VyNest Logo">
      </a>
    </div>

    <div class="flex items-center">
      <div class="relative" id="profileWrapper">
        <button id="profileBtn" onclick="toggleProfileDropdown()" class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full p-1 pr-3 hover:bg-slate-100 transition focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
          
          <div id="navAvatar" class="w-8 h-8 md:w-9 md:h-9 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-full flex items-center justify-center text-white text-xs md:text-sm font-black uppercase shadow-inner border border-white/20">
            --
          </div>
          
          <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
        </button>

        <div id="profileDropdown" class="hidden absolute right-0 mt-3 w-52 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden z-50">
          <div class="px-5 py-4 border-b bg-slate-50/50">
            <p class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Student Account</p>
            <p id="studentEmailNav" class="text-xs font-bold text-slate-700 truncate">Loading...</p>
          </div>
          
          <div class="p-1.5">
            <a href="profile.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 rounded-xl transition font-medium">
              <i data-lucide="user" class="w-4 h-4 text-indigo-400"></i> My Profile
            </a>

            <button onclick="logout()" class="w-full text-left flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 rounded-xl transition font-medium">
              <i data-lucide="log-out" class="w-4 h-4 text-red-400"></i> Log out
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</nav>

<main class="max-w-2xl mx-auto px-6 py-16">
  <div class="glass-effect rounded-[2rem] shadow-2xl shadow-indigo-100/50 overflow-hidden">
    <div class="h-28 md:h-20 premium-gradient opacity-90"></div>

    <div class="px-8 pb-10">
      <div class="relative -mt-12 mb-6 flex justify-center">
        <div id="profileAvatar" class="w-24 h-24 md:w-20 md:h-20 rounded-3xl premium-gradient flex items-center justify-center text-white text-4xl md:text-3xl font-bold border-4 border-white shadow-lg">
          --
        </div>
      </div>

      <div class="text-center mb-8 md:mb-5">
        <h2 id="studentName" class="text-2xl font-bold tracking-tight text-slate-900">Loading...</h2>
        <p id="studentEmail" class="text-slate-500 font-medium">---</p>
        <div class="mt-4 inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-indigo-50 text-indigo-700 text-xs font-bold uppercase tracking-wide">
          <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Verified Student
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4">
        <div class="flex items-center justify-between p-4 rounded-2xl bg-slate-50/50 border border-slate-100">
          <div class="flex items-center gap-3">
            <div class="p-2 bg-white rounded-lg shadow-sm text-indigo-500">
              <i data-lucide="phone" class="w-5 h-5"></i>
            </div>
            <span class="text-sm font-medium text-slate-600">Phone</span>
          </div>
          <span id="studentPhone" class="text-sm font-bold text-slate-900">---</span>
        </div>

        <div class="flex items-center justify-between p-4 rounded-2xl bg-slate-50/50 border border-slate-100">
          <div class="flex items-center gap-3">
            <div class="p-2 bg-white rounded-lg shadow-sm text-indigo-500">
              <i data-lucide="calendar" class="w-5 h-5"></i>
            </div>
            <span class="text-sm font-medium text-slate-600">Resident Since</span>
          </div>
          <span id="memberSince" class="text-sm font-bold text-slate-900">---</span>
        </div>
      </div>

      <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <p class="text-sm text-slate-500 mb-6 font-medium">Need help with your stay?</p>
        <button onclick="openSupportModal()" class="w-full sm:w-auto px-8 py-3 rounded-2xl premium-gradient text-white font-semibold hover:opacity-90 transition-all flex items-center justify-center gap-2 mx-auto">
          <i data-lucide="headphones" class="w-5 h-5"></i>
          Contact Student Support
        </button>
      </div>
    </div>
  </div>

  <a href="index.html" class="flex items-center justify-center gap-2 mt-8 text-sm font-medium text-slate-400 hover:text-indigo-600 transition">
    <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
  </a>
</main>

<div id="supportModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-[200] p-4">
  <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl modal-animate">
    <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i data-lucide="life-buoy" class="w-8 h-8"></i>
    </div>
    <h3 class="font-bold text-xl mb-2 text-slate-900">Student Support</h3>
    <p class="text-sm text-slate-500 mb-8">Facing issues with your room or owner? We're here to help.</p>
    
    <div class="space-y-3">
      <a href="tel:+917599741846" class="flex items-center justify-between p-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition font-medium">
        <span class="text-slate-600">Call Support</span>
        <span class="text-indigo-600">+91 7599741846</span>
      </a>
      <a href="mailto:support@vynest.com" class="flex items-center justify-between p-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition font-medium">
        <span class="text-slate-600">Email</span>
        <span class="text-indigo-600">support@vynest.com</span>
      </a>
    </div>
    
    <button onclick="closeSupportModal()" class="mt-8 w-full py-4 rounded-2xl bg-slate-900 text-white font-bold hover:bg-slate-800 transition">Dismiss</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAd_HMHS9QkOe2pt_tH-sunWpuIaULCxtY",
    authDomain: "vynest-b58fa.firebaseapp.com",
    projectId: "vynest-b58fa",
    storageBucket: "vynest-b58fa.firebasestorage.app",
    messagingSenderId: "503196958388",
    appId: "1:503196958388:web:b78d771ddbd8dbf56161e1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "../../pages/login.html";
      return;
    }

    try {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      const userData = userDoc.exists() ? userDoc.data() : {};
      
      const name = userData.fullName || user.displayName || "Student";
      const email = user.email || "---";
      const initial = name[0].toUpperCase();

      // Update Nav
      document.getElementById('studentEmailNav').innerText = email;
      document.getElementById('navAvatar').innerText = initial;

      // Update Profile Card
      document.getElementById('studentName').innerText = name;
      document.getElementById('studentEmail').innerText = email;
      document.getElementById('studentPhone').innerText = userData.phone || "Not Provided";
      document.getElementById('profileAvatar').innerText = initial;

      document.getElementById('memberSince').innerText = new Date(user.metadata.creationTime)
        .toLocaleDateString("en-IN", { month: "long", year: "numeric" });
      
      // Refresh icons after data load
      lucide.createIcons();
    } catch (error) {
      console.error("Error fetching profile:", error);
    }
  });

  window.logout = async () => {
    await signOut(auth);
    window.location.href = "../../index.html";
  };
</script>

<script>
  function toggleProfileDropdown() {
    const dropdown = document.getElementById("profileDropdown");
    dropdown.classList.toggle("hidden");
  }

  // Improved Click-away logic
  window.addEventListener("click", function(event) {
    const profileWrapper = document.getElementById('profileWrapper');
    const dropdown = document.getElementById("profileDropdown");
    
    if (profileWrapper && !profileWrapper.contains(event.target)) {
      dropdown.classList.add("hidden");
    }
  });

  function openSupportModal() { document.getElementById("supportModal").classList.remove("hidden"); }
  function closeSupportModal() { document.getElementById("supportModal").classList.add("hidden"); }
</script>

</body>
</html>
