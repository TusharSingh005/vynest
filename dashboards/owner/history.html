<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Log | VyNest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* Custom Scrollbar for the table */
    .table-container::-webkit-scrollbar {
      height: 6px;
    }
    .table-container::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
  </style>
</head>
<body class="bg-white text-slate-900">

  <nav class="bg-white border-b px-4 md:px-8 py-3 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-2">
      <a href="../../index.html"><img src="../../imgs/logo.png" alt="Vynest" class="h-10"></a>
    </div>
    <div class="relative">
      <button id="profileBtn" onclick="document.getElementById('profileDropdown').classList.toggle('hidden')" class="flex items-center gap-2 bg-gray-50 border rounded-full px-3 py-1.5 hover:bg-gray-100 transition">
        <div class="w-8 h-8 bg-[#6366f1] rounded-full flex items-center justify-center text-white font-bold">A</div>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M19 9l-7 7-7-7" stroke-width="2"/>
        </svg>
      </button>
      <div id="profileDropdown" class="hidden absolute right-0 mt-3 w-48 bg-white border rounded-xl shadow-lg overflow-hidden z-50">
        <a href="profile.html" class="flex items-center gap-2 px-4 py-3 text-sm text-slate-700 hover:bg-slate-50">👤 Profile</a>
        <button onclick="logout()" class="w-full text-left flex items-center gap-2 px-4 py-3 text-sm text-red-600 hover:bg-red-50">🚪 Log out</button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto p-4 md:p-8">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 mb-8 gap-4">
      <div>
        <h1 class="text-2xl font-bold">Booking History</h1>
        <p class="text-gray-500">Total Records: <span id="totalBookings" class="text-black font-bold">0</span></p>
      </div>
      
    </header>

    <div class="table-container overflow-x-auto border rounded-xl">
      <table class="w-full text-left border-collapse min-w-[800px]">
        <thead>
          <tr class="bg-slate-50 border-b">
            <th class="p-4 font-bold text-xs text-slate-500 uppercase">Student Name</th>
            <th class="p-4 font-bold text-xs text-slate-500 uppercase">Contact Info</th>
            <th class="p-4 font-bold text-xs text-slate-500 uppercase">Property @ Room</th>
            <th class="p-4 font-bold text-xs text-center text-slate-500 uppercase">Date</th>
            <th class="p-4 font-bold text-xs text-right text-slate-500 uppercase">Booking Amount</th>
          </tr>
        </thead>
        <tbody id="historyTableBody">
          <tr id="loadingState">
            <td colspan="5" class="py-20 text-center text-gray-400 italic font-medium">
              Syncing student records...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAd_HMHS9QkOe2pt_tH-sunWpuIaULCxtY",
      authDomain: "vynest-b58fa.firebaseapp.com",
      projectId: "vynest-b58fa",
      storageBucket: "vynest-b58fa.firebasestorage.app",
      messagingSenderId: "503196958388",
      appId: "1:503196958388:web:b78d771ddbd8dbf56161e1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) loadBookingHistory(user.uid);
      else window.location.href = "login.html";
    });

    async function loadBookingHistory(ownerId) {
  const tableBody = document.getElementById('historyTableBody');
  const totalEl = document.getElementById('totalBookings');

  try {

    // Only filter by owner
    const q = query(
      collection(db, "bookings"),
      
    );

    const querySnapshot = await getDocs(q);

    tableBody.innerHTML = "";
    totalEl.innerText = querySnapshot.size;

    if (querySnapshot.empty) {
      tableBody.innerHTML = `
        <tr>
          <td colspan="5" class="py-12 text-center text-gray-400 font-semibold">
            No bookings yet.
          </td>
        </tr>
      `;
      return;
    }

    // Convert to array and sort manually
    let bookings = [];

    querySnapshot.forEach(docSnap => {
      bookings.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    bookings.sort((a,b)=>{
      if(!a.createdAt || !b.createdAt) return 0;
      return b.createdAt.seconds - a.createdAt.seconds;
    });

    for (const bookingData of bookings) {

      let studentName = "Student";
      let studentPhone = "N/A";

      if (bookingData.userId) {
        const userSnap = await getDoc(doc(db,"users",bookingData.userId));

        if(userSnap.exists()){
          const u = userSnap.data();
          studentName = u.fullName || "Student";
          studentPhone = u.phone || "N/A";
        }
      }

      const date = bookingData.createdAt
        ? new Date(bookingData.createdAt.seconds*1000).toLocaleDateString("en-GB")
        : "N/A";

      const row = `
      <tr class="border-b hover:bg-gray-50">

        <td class="p-4">
          <div class="font-semibold">${studentName}</div>
          <div class="text-xs text-gray-400">${bookingData.userEmail || ""}</div>
        </td>

        <td class="p-4 text-sm font-medium">
          ${studentPhone}
        </td>

        <td class="p-4">
          <div class="font-semibold text-indigo-600">
            ${bookingData.propertyName || "Property"}
          </div>
          <div class="text-xs text-gray-400">
            ${bookingData.roomType || "Room"}
          </div>
        </td>

        <td class="p-4 text-center font-semibold text-gray-600">
          ${date}
        </td>

      <td class="p-4 text-right">
  <div class="inline-block px-3 py-1 text-xs font-bold text-green-700 bg-green-100 rounded-full">
    Booking Paid
  </div>
</td>

      </tr>
      `;

      tableBody.innerHTML += row;
    }

  } catch (error) {

    console.error(error);

    tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="py-10 text-center text-red-500">
          Failed to load bookings
        </td>
      </tr>
    `;
  }
}
    window.logout = () => signOut(auth).then(() => { window.location.href = "../../index.html"; });
  </script>
</body>
</html>
