<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Processing Booking...</title>
</head>

<body style="font-family: sans-serif; text-align:center; padding:50px;">
  
  <h2>Processing your booking... ⏳</h2>
  <p id="statusText">Please wait, do not refresh.</p>

 <script type="module">
const BACKEND_BASE_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")
  ? "http://localhost:3000"
  : "https://vynest-backend.pages.dev";

const verifyAndSave = async () => {
  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get("order_id");

  if (!orderId) {
    alert("Invalid payment.");
    window.location.href = "/";
    return;
  }

  const statusText = document.getElementById("statusText");
  const maxAttempts = 10;

  for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
    statusText.innerText = `Verifying payment... (${attempt}/${maxAttempts})`;

    const res = await fetch(`${BACKEND_BASE_URL}/verify-payment/${orderId}`);
    const result = await res.json();

    if (result.success) {
      statusText.innerText = "Payment confirmed. Redirecting...";
      window.location.href = "/dashboards/student/index.html?booking=success";
      return;
    }

    await new Promise(resolve => setTimeout(resolve, 2000));
  }

  statusText.innerText = "Payment is still processing. Please refresh after a moment.";
};

verifyAndSave();
</script>

</body>
</html>
