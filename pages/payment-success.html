<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Processing Booking...</title>
</head>

<body style="font-family: sans-serif; text-align:center; padding:50px;">
  
  <h2>Processing your booking... ⏳</h2>
  <p id="statusText">Please wait, do not refresh.</p>

 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const BACKEND_BASE_URL = "https://vynest-backend.vynest750.workers.dev";

const firebaseConfig = {
  apiKey: "AIzaSyAd_HMHS9QkOe2pt_tH-sunWpuIaULCxtY",
  authDomain: "vynest-b58fa.firebaseapp.com",
  projectId: "vynest-b58fa",
  storageBucket: "vynest-b58fa.firebasestorage.app",
  messagingSenderId: "503196958388",
  appId: "1:503196958388:web:b78d771ddbd8dbf56161e1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const getIdTokenFromCurrentUser = () =>
  new Promise((resolve) => {
    const unsubscribe = onAuthStateChanged(auth, async (user) => {
      unsubscribe();

      if (!user) {
        resolve(null);
        return;
      }

      try {
        const token = await user.getIdToken();
        resolve(token);
      } catch (_error) {
        resolve(null);
      }
    });
  });

const verifyAndSave = async () => {
  const idToken = await getIdTokenFromCurrentUser();

  if (!idToken) {
    alert("Please log in to verify your payment.");
    window.location.href = "/pages/login.html";
    return;
  }

  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get("order_id");

  if (!orderId) {
    alert("Invalid payment.");
    window.location.href = "/";
    return;
  }

  const statusText = document.getElementById("statusText");
  const maxAttempts = 15;

  for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
    statusText.innerText = `Verifying payment... (${attempt}/${maxAttempts})`;

    let result = null;

    try {
      const res = await fetch(`${BACKEND_BASE_URL}/verify-payment/${orderId}`, {
        headers: {
          Authorization: `Bearer ${idToken}`
        }
      });
      result = await res.json();
    } catch (error) {
      console.error("Verify payment failed", error);
      result = { success: false, status: "NETWORK_ERROR" };
    }

    if (result.success) {
      statusText.innerText = "Payment confirmed. Redirecting to dashboard in 3 seconds...";
      await new Promise((resolve) => setTimeout(resolve, 3000));
      window.location.href = `/dashboards/student/index.html?booking=success&order_id=${encodeURIComponent(orderId)}`;
      return;
    }

    if (result.status === "PAID_BOOKING_PENDING") {
      statusText.innerText = `Payment confirmed. Finalizing booking... (${attempt}/${maxAttempts})`;
      await new Promise(resolve => setTimeout(resolve, 2000));
      continue;
    }

    await new Promise(resolve => setTimeout(resolve, 2000));
  }

  statusText.innerText = "Payment is still processing. Please refresh after a moment.";
};

verifyAndSave();
</script>

</body>
</html>
