               <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

 


 
</div>
 <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<!-- PASSWORD -->
<div class="space-y-2" >
<label class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest ml-1">
Password
</label>

<div class="relative">
<input
type="password"
id="password"
required

</button>

</div>
</div>


<!-- CONFIRM PASSWORD -->
<div class="space-y-2">
<label class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest ml-1">
Confirm Password
</label>

<div class="relative">
<input
type="password"
id="confirmPassword"
required
class="w-full bg-slate-50 border border-slate-100 rounded-2xl px-6 py-4 pr-12 text-sm font-bold focus:bg-white focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all"
/>

<button
type="button"
onclick="togglePassword('confirmPassword','eye2')"
class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600"
>
<i id="eye2" class="fa-solid fa-eye"></i>
</button>

</div>
</div>

</div>

                <label class="flex items-start gap-3 cursor-pointer group">
                    <input type="checkbox" id="termsCheck" class="w-5 h-5 mt-0.5 rounded border-slate-300 accent-indigo-600 cursor-pointer">
                    <span class="text-xs font-medium text-slate-500 leading-relaxed">
                        I confirm that I have read and agree to VyNest's

                        <a href="signup-privacy-policy.html" class="text-indigo-600 font-bold hover:underline">Privacy Policy</a>.
                    </span>
                </label>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-1 transition-all active:scale-95 text-sm uppercase tracking-[0.2em]">
                    Create Account
                </button>

                <div class="text-center">
                    <p class="text-sm font-medium text-slate-500">Already have an account? <a href="login.html" class="text-indigo-600 font-black hover:underline ml-1">Login here</a></p>
                </div>

<script>
function togglePassword(inputId, iconId) {

const input = document.getElementById(inputId);
const icon = document.getElementById(iconId);

if (input.type === "password") {
    input.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
} else {
    input.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
}

}
</script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAd_HMHS9QkOe2pt_tH-sunWpuIaULCxtY",
            authDomain: "vynest-b58fa.firebaseapp.com",
            projectId: "vynest-b58fa",
            storageBucket: "vynest-b58fa.firebasestorage.app",
            messagingSenderId: "503196958388",
            appId: "1:503196958388:web:b78d771ddbd8dbf56161e1",
            measurementId: "G-XK1ZYCS455"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signupForm = document.getElementById('signupForm');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const termsCheck = document.getElementById('termsCheck');
            const role = document.querySelector('input[name="role"]:checked').value;
            const submitBtn = document.getElementById('submitBtn');

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }
            if (!termsCheck.checked) {
                alert("Please agree to the Terms & Conditions to proceed.");
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "CREATING ACCOUNT...";

                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    phone: phone,
                    email: email,
                    role: role,
                    uid: user.uid,
                    createdAt: new Date()
                });

                alert("Account created successfully!");
                
                if(role === 'student') {
                    window.location.href = "../dashboards/student/index.html";
                } else {
                    window.location.href = "../dashboards/owner/index.html";
                }

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "CREATE ACCOUNT";
            }
        });
    </script>
