<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYNEST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body {
            background-color: #000;
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .launch-text {
            /* Responsive text that fills the screen width */
            font-size: clamp(2rem, 12vw, 15rem);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            text-align: center;
            line-height: 1;
        }

        .dot {
            color: #3b82f6; /* Subtle blue accent */
        }
    </style>
</head>
<body>

    <h1 class="launch-text">
        LAUNCHING<br>SOON<span class="dot">.</span>
    </h1>

</body>
</html>
