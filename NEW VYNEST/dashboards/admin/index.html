<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | VyNest</title><link rel="icon" type="image/png" href="/imgs/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 no-scrollbar">
    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 py-4">
        <div class="w-full flex items-center justify-between px-2 md:px-4">
            <div class="flex items-center gap-2 md:gap-3">
                <a href="../../index.html"> 
                    <img src="/imgs/logo.png" alt="VyNest" class="h-6 md:h-10">
                </a>
                <span class="bg-indigo-600 text-white text-[7px] md:text-[9px] font-black px-1.5 md:px-2 py-0.5 rounded tracking-widest uppercase">Admin</span>
            </div>
            <button onclick="handleLogout()" class="text-rose-500 font-bold text-xs md:text-sm hover:bg-rose-50 px-3 md:px-4 py-2 rounded-xl transition">
                <i class="fa-solid fa-power-off mr-1 md:mr-2"></i>Logout
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-3 md:px-6 py-6 md:py-10">
        <div class="grid grid-cols-3 gap-2 md:gap-6 mb-8 md:mb-12">
            <div class="bg-white p-3 md:p-8 rounded-2xl md:rounded-[2.5rem] border border-slate-100 shadow-sm text-center md:text-left">
                <p class="text-[7px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Rooms</p>
                <h3 id="stat-rooms" class="text-lg md:text-4xl font-black text-slate-900 mt-1 md:mt-2">0</h3>
            </div>
            <div class="bg-white p-3 md:p-8 rounded-2xl md:rounded-[2.5rem] border border-slate-100 shadow-sm text-center md:text-left">
                <p class="text-[7px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Users</p>
                <h3 id="stat-users" class="text-lg md:text-4xl font-black text-slate-900 mt-1 md:mt-2">0</h3>
            </div>
            <div class="bg-white p-3 md:p-8 rounded-2xl md:rounded-[2.5rem] border border-slate-100 shadow-sm text-center md:text-left">
                <p class="text-[7px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Bookings</p>
                <h3 id="stat-bookings" class="text-lg md:text-4xl font-black text-slate-900 mt-1 md:mt-2">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl md:rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm">
            <div class="p-6 md:p-8 border-b border-slate-100 flex flex-row items-center justify-start gap-6 md:gap-8">
                <button onclick="switchTab('users')" id="tab-users" class="tab-active pb-2 text-xs md:text-sm font-black uppercase tracking-widest transition-all">Users List</button>
                <button onclick="switchTab('rooms')" id="tab-rooms" class="pb-2 text-xs md:text-sm font-bold text-slate-400 uppercase tracking-widest hover:text-slate-600 transition-all">Rooms List</button>
            </div>

            <div class="overflow-x-auto w-full">
                <table class="w-full text-left min-w-[700px]">
                    <thead class="bg-slate-50/50">
                        <tr class="text-[9px] md:text-[10px] font-black text-slate-400 uppercase tracking-widest" id="table-head"></tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>
 
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


/* ================= FIREBASE ================= */

const firebaseConfig = {
apiKey: "AIzaSyAd_HMHS9QkOe2pt_tH-sunWpuIaULCxtY",
authDomain: "vynest-b58fa.firebaseapp.com",
projectId: "vynest-b58fa",
storageBucket: "vynest-b58fa.firebasestorage.app",
messagingSenderId: "503196958388",
appId: "1:503196958388:web:b78d771ddbd8dbf56161e1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


/* ================= AUTH ================= */

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="./login.html";
}
});

window.handleLogout = async()=>{
await signOut(auth);
window.location.href="../../index.html";
}


/* ================= GLOBAL ================= */

let currentTab = "users";


/* ================= STATS ================= */

function updateStats(){

onSnapshot(collection(db,"rooms"),snap=>{
document.getElementById("stat-rooms").innerText = snap.size;
});

onSnapshot(collection(db,"users"),snap=>{
const nonAdmins = snap.docs.filter(d=>d.data().role !== "admin");
document.getElementById("stat-users").innerText = nonAdmins.length;
});

onSnapshot(collection(db,"bookings"),snap=>{
document.getElementById("stat-bookings").innerText = snap.size;
});

}


/* ================= TAG STYLE ================= */

function getTagStyle(type){

const t = (type || "").toLowerCase();

if(t.includes("food"))
return "bg-green-100 text-green-700 border-green-200";

if(t === "flat")
return "bg-red-100 text-red-700 border-red-200";

if(t === "hostel")
return "bg-blue-100 text-blue-700 border-blue-200";

return "bg-slate-100 text-slate-600 border-slate-200";

}


/* ================= TAB SWITCH ================= */

window.switchTab = (type)=>{

currentTab = type;

const tableHead = document.getElementById("table-head");
const tabUsers = document.getElementById("tab-users");
const tabRooms = document.getElementById("tab-rooms");

if(type === "users"){

tabUsers.className="tab-active pb-2 text-xs md:text-sm font-black uppercase tracking-widest";
tabRooms.className="pb-2 text-xs md:text-sm font-bold text-slate-400 uppercase";

tableHead.innerHTML=`
<th class="px-6 py-5">User Details</th>
<th class="px-6 py-5">Email Address</th>
<th class="px-6 py-5">Category</th>
<th class="px-6 py-5 text-right">Action</th>
`;

loadUsers();

}

else{

tabRooms.className="tab-active pb-2 text-xs md:text-sm font-black uppercase tracking-widest";
tabUsers.className="pb-2 text-xs md:text-sm font-bold text-slate-400 uppercase";

tableHead.innerHTML=`
<th class="px-6 py-5">Property Name</th>
<th class="px-6 py-5">Property Type</th>
<th class="px-6 py-5">Owner Name</th>
<th class="px-6 py-5 text-right">Action</th>
`;

loadRooms();

}

};


/* ================= USERS TABLE ================= */

function loadUsers(){

onSnapshot(collection(db,"users"),snapshot=>{

if(currentTab !== "users") return;

const tableBody=document.getElementById("table-body");
tableBody.innerHTML="";

snapshot.forEach(userDoc=>{

const user=userDoc.data();
const id=userDoc.id;

if(user.role==="admin" || user.email==="admin@gmail.com") return;

const isBlocked=user.status==="blocked";

tableBody.innerHTML+=`

<tr class="hover:bg-slate-50">

<td class="px-6 py-5">
<p class="font-black text-sm">${user.fullName || "Unnamed User"}</p>
<p class="text-xs text-slate-400">${user.phone || "N/A"}</p>
</td>

<td class="px-6 py-5 text-sm">${user.email}</td>

<td class="px-6 py-5">
<span class="text-[10px] font-black px-3 py-1 rounded border
${user.role==="owner"?"bg-indigo-50 text-indigo-600":"bg-slate-100 text-slate-600"}">
${user.role || "student"}
</span>
</td>

<td class="px-6 py-5 text-right">
<button onclick="toggleBlockUser('${id}',${isBlocked})"
class="${isBlocked?'bg-emerald-50 text-emerald-600':'bg-rose-50 text-rose-600'} px-4 py-2 rounded-xl text-xs font-black">
${isBlocked?'Unblock':'Block'}
</button>
</td>

</tr>

`;

});

});

}


/* ================= ROOMS TABLE ================= */

function loadRooms(){

onSnapshot(collection(db,"rooms"),snapshot=>{

if(currentTab !== "rooms") return;

const tableBody=document.getElementById("table-body");
tableBody.innerHTML="";

snapshot.forEach(roomDoc=>{

const room=roomDoc.data();
const id=roomDoc.id;

const ownerName = room.ownerName || "Unknown Owner";

const tagStyle=getTagStyle(room.propertyType);

tableBody.innerHTML+=`

<tr class="hover:bg-slate-50">

<td class="px-6 py-5">
<p class="font-black text-sm">${room.propertyName || "Unnamed Property"}</p>
<p class="text-xs text-slate-400">${room.address || ""}</p>
</td>

<td class="px-6 py-5">
<span class="text-[10px] font-black px-3 py-1 rounded border ${tagStyle}">
${(room.propertyType || "").replace(/_/g," ")}
</span>
</td>

<td class="px-6 py-5 text-sm font-bold text-slate-700">
${ownerName}
</td>

<td class="px-6 py-5 text-right">
<button onclick="deleteRoom('${id}')"
class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-rose-600">
Remove
</button>
</td>

</tr>

`;

});

});

}


/* ================= ACTIONS ================= */

window.toggleBlockUser = async(id,isBlocked)=>{

const newStatus=isBlocked?"active":"blocked";

await updateDoc(doc(db,"users",id),{
status:newStatus
});

};


window.deleteRoom = async(id)=>{

if(confirm("Delete this property?")){
await deleteDoc(doc(db,"rooms",id));
}

};


/* ================= INIT ================= */

updateStats();
switchTab("users");

</script>


</body>
</html>
